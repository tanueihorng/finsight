  <rect x="842" y="290" width="376" height="7" rx="3.5" fill="#1b1633"/>
  <rect x="842" y="290" width="376" height="7" rx="3.5" fill="#a78bfa"/>

  <text x="842" y="332" font-size="12" fill="#7e7e96">BLENDED ENTRY</text>
  <text x="1010" y="332" font-size="12" text-anchor="end" fill="#e8ecf0">1.3284</text>
  <text x="1050" y="332" font-size="12" fill="#7e7e96">DRIFT</text>
  <text x="1218" y="332" font-size="12" text-anchor="end" fill="#f87171">−2.7%</text>

  <line x1="842" y1="348" x2="1218" y2="348" stroke="#20203a"/>
  <text x="842" y="372" font-size="11" fill="#6b6b85">PER-BUY FX</text>
  <text x="842" y="392" font-size="12" fill="#c4b5fd">AAPL</text>
  <text x="980" y="392" font-size="12" text-anchor="end" fill="#7e7e96">1.3503→1.2931</text>
  <text x="1218" y="392" font-size="12" text-anchor="end" fill="#f87171">−S$134</text>

  <!-- footer -->
  <text x="44" y="430" font-size="11" fill="#4b4b63">$ node server.js  →  http://localhost:8000      ·      Yahoo Finance · FRED · World Bank · zero dependencies</text>
