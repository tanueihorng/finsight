    <text x="365" y="156" font-size="30" font-weight="700" fill="#2ec27e">+S$233.40</text>
    <text x="365" y="180" font-size="13" fill="#6b6b85">today</text>

    <rect x="650" y="92" width="283" height="104" rx="8" fill="#12121f" stroke="#20203a"/>
