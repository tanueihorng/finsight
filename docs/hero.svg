  <text x="1236" y="49" font-size="13" text-anchor="end" letter-spacing="1.5" fill="#7e7e96">● <tspan fill="#2ec27e">LIVE</tspan>   ·   NO API KEYS   ·   OFFLINE   ·   MIT</text>
  <line x1="44" y1="70" x2="1236" y2="70" stroke="#20203a"/>

  <!-- metric cards -->
  <g>
