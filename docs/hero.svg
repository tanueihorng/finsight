  </g>

  <!-- performance panel -->
  <rect x="44" y="216" width="760" height="192" rx="8" fill="#0d0d18" stroke="#20203a"/>
  <text x="62" y="244" font-size="13" letter-spacing="1.5" fill="#a78bfa">PORTFOLIO PERFORMANCE<tspan fill="#2ec27e" letter-spacing="0">   +24.2% · 1Y</tspan></text>
  <line x1="62" y1="392" x2="786" y2="392" stroke="#20203a"/>
  <path d="M70,392 L70,378 124,372 179,360 233,366 288,344 342,350 397,330 451,338 506,316 560,300 615,308 669,284 724,272 780,258 L780,392 Z" fill="url(#area)"/>
